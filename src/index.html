<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css" />
    <title>TailWind</title>
</head>

<body class="bg-mainColor text-pink-900">
    <header class="container mx-auto px-4 md:px-2 bg-purple-200">
        <div class="flex justify-between pt-big">
            <span class="font-bold  text-3xl">TailWind</span>
            <div class="space-x-5">
                <a href="" class="hover:underline">About</a>
                <a href="" class="bg-red-400 py-2 px-4 rounded-full hover:bg-red-700">Contacts</a>
            </div>
        </div>
    </header>
    <main class="container mx-auto py-big px-3 sm:px-0">
        <h1 class="text-center text-3xl font-bold">Rapidly build modern websites without ever leaving your HTML.</h1>
        <p class="pt-5 w-full sm:w-sm mx-auto">
            A utility-first CSS framework packed with classes like flex, pt-4, text-center and rotate-90 that can be composed to build any design, directly in your markup.
        </p>

        <div class="flex justify-center pt-big space-x-1 md:space-x-10 flex-col md:flex-row space-y-5 md:space-y-0">
            <div class="bg-red-400 text-center py-2 px-4 rounded-full hover:bg-red-700">
                Reviews
            </div>
            <div class="bg-red-400 text-center py-2 px-4 rounded-full hover:bg-red-700">
                Contacts
            </div>
            <div class="bg-red-400 text-center py-2 px-4 rounded-full hover:bg-red-700">
                Vacancies
            </div>
            <div class="bg-red-400 text-center py-2 px-4 rounded-full hover:bg-red-700">
                Products
            </div>
        </div>
    </main>

    <div class="container mx-auto py-big grid grid-columns-4 grid-flow-col gap-4">
        <div class="bg-purple-300 w-1/2 h-25"></div>
        <div class="bg-purple-300 w-3/5 h-25"></div>
        <div class="bg-purple-300 w-1/6 h-25"></div>
        <div class="bg-linear-to-r from-purple-400 via-pink-400 to-red-400  w-full h-25"></div>
    </div>
</body>
</html>
